<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="utf-8"><title>Pairing Code</title>
<style>
body{margin:0;font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{background:rgba(255,255,255,.06);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:40px;max-width:500px;width:100%;text-align:center}
h2{font-size:22px;color:#f0c040;margin:0 0 4px}
p{font-size:14px;color:#9090b8;margin:0 0 20px}
.code{font-size:42px;font-weight:bold;letter-spacing:12px;color:#f0c040;background:rgba(240,192,64,.08);border:1px solid rgba(240,192,64,.15);padding:20px;border-radius:12px;margin:20px 0;direction:ltr}
.step{text-align:start;margin:12px 0;padding:12px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:10px;color:#c0c0e0;font-size:14px}
.step b{color:#f0c040}
</style>
</head>
<body>
<div class="container">
<h2>WhatsApp Pairing Code</h2>
<p>أدخل هذا الكود في واتساب على جوالك</p>
<div class="code">H51LZC34</div>
<div class="step"><b>الخطوة 1:</b> افتح واتساب على جوالك</div>
<div class="step"><b>الخطوة 2:</b> اذهب إلى Settings → Linked Devices</div>
<div class="step"><b>الخطوة 3:</b> اختر "Link with phone number"</div>
<div class="step"><b>الخطوة 4:</b> أدخل الكود: <b>H51LZC34</b></div>
</div>
</body></html>
